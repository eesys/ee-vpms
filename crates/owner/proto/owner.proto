syntax = "proto3";

package owner;

service OwnerService {
  rpc CreateOwner (CreateOwnerRequest) returns (OwnerResponse);
  rpc GetOwner (GetOwnerRequest) returns (OwnerResponse);
  rpc ListOwners (ListOwnersRequest) returns (ListOwnersResponse);
  rpc UpdateOwner (UpdateOwnerRequest) returns (OwnerResponse);
  rpc DeleteOwner (DeleteOwnerRequest) returns (DeleteOwnerResponse);
}

message CreateOwnerRequest {
  string          name  = 1;
  optional string email = 2;
}

message GetOwnerRequest {
  string id = 1;
}

message ListOwnersRequest {}

message UpdateOwnerRequest {
  string                   id    = 1;
  optional string          name  = 2;
  optional string          email = 3;
}

message DeleteOwnerRequest {
  string id = 1;
}

message OwnerResponse {
  string          id          = 1;
  string          name        = 2;
  optional string email       = 3;
  optional string phone       = 4;
  optional string address     = 5;
  optional string city        = 6;
  optional string state       = 7;
  optional string postal_code = 8;
  optional string country     = 9;
  int64           created_at  = 10;
  int64           updated_at  = 11;
}

message ListOwnersResponse {
  repeated OwnerResponse owners = 1;
}

message DeleteOwnerResponse {
  bool success = 1;
}
