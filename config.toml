# EE-VPMS Service Discovery Configuration (go-zero Compatible, TOML Format)
# 
# This configuration file defines service discovery for ee-vpms microservices
# Supports both static (Direct) and dynamic (Etcd) service discovery

# ========== Direct Service Discovery ==========
# Use this for static service addresses (development/testing)
[direct]

[direct.services]

[direct.services.owner]
addr = "http://[::1]:50051"
resolver_type = "direct"

# Add more services here
# [direct.services.tenant]
# addr = "http://[::1]:50052"
# resolver_type = "direct"

# [direct.services.pet]
# addr = "http://[::1]:50053"
# resolver_type = "direct"

# ========== Etcd Service Discovery ==========
# Enable this for dynamic service discovery (production)
# Requires etcd to be running and services to register themselves
# [etcd]
# hosts = ["127.0.0.1:2379", "127.0.0.1:2380"]
# key = "/ee-vpms"
# username = ""
# password = ""

# ========== Environment Variable Precedence ==========
# If environment variables are set, they take precedence:
# - OWNER_SERVICE_ADDR (overrides direct.services.owner.addr)
# - Other service addresses can be set similarly
